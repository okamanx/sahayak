<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahayak — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; max-width: 280px; margin: 0 auto 24px; }
    button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div>
    <div class="icon">📶</div>
    <h1>You're Offline</h1>
    <p>Sahayak needs an internet connection to submit and track reports. Please reconnect and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
